services:
  mongo:
    image: mongo:4.4
    container_name: ong-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-example}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ong}
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
